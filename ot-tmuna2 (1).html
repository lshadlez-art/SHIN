<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>אות פותחת / אות סוגרת</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FFF7F0;
  --coral: #FF6B35;
  --teal: #3DBFA8;
  --yellow: #FFD166;
  --green: #5CC869;
  --red: #FF5C5C;
  --purple: #B48FE0;
  --text: #2A2A2A;
  --muted: #AAA;
  --card: #fff;
  --shadow: 0 6px 24px rgba(0,0,0,0.09);
  --radius: 20px;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body {
  font-family:'Rubik',sans-serif;
  background: var(--bg);
  background-image:
    radial-gradient(circle at 15% 15%, #FFE8D2 0%, transparent 45%),
    radial-gradient(circle at 85% 85%, #D4F5EF 0%, transparent 45%);
  min-height:100vh;
  display:flex; flex-direction:column; align-items:center;
  padding:14px 12px 32px;
}

/* HOME */
.home {
  width:100%; max-width:480px;
  display:flex; flex-direction:column; align-items:center;
  gap:24px; padding-top:32px;
}
.home-game-name {
  font-size:1.5rem; font-weight:900; color:var(--coral);
  text-align:center; letter-spacing:-0.5px; margin-bottom:4px;
}
.home-title {
  font-size:2rem; font-weight:900; color:var(--text); text-align:center;
}
.home-sub { font-size:1rem; color:var(--muted); text-align:center; }
.home-btns { display:flex; flex-direction:column; gap:14px; width:100%; }
.mode-btn {
  border:none; border-radius:20px; padding:22px 20px;
  font-family:'Rubik',sans-serif; font-size:1.35rem; font-weight:900;
  cursor:pointer; text-align:right; display:flex; align-items:center; gap:14px;
  box-shadow:0 6px 20px rgba(0,0,0,0.10);
  transition:transform 0.15s;
  touch-action:manipulation;
}
.mode-btn:hover { transform:scale(1.03); }
.mode-btn.start { background:linear-gradient(135deg,#FF8C5A,#FF6B35); color:#fff; }
.mode-btn.end   { background:linear-gradient(135deg,#5EC7B8,#3DBFA8); color:#fff; }
.mode-btn .btn-icon { font-size:2.2rem; }
.mode-btn .btn-text { display:flex; flex-direction:column; gap:2px; }
.mode-btn .btn-label { font-size:1.25rem; font-weight:900; }
.mode-btn .btn-desc  { font-size:0.82rem; font-weight:400; opacity:0.88; }

/* HEADER */
.header {
  width:100%; max-width:520px;
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:10px;
}
.title { font-size:1.15rem; font-weight:900; }
.title.start-mode { color:var(--coral); }
.title.end-mode   { color:var(--teal); }
.round-info { font-size:0.88rem; font-weight:700; color:var(--muted); }
.back-btn {
  background:none; border:none; font-size:1rem; color:var(--muted);
  cursor:pointer; font-family:'Rubik',sans-serif; font-weight:700;
  padding:4px 8px; border-radius:8px;
  transition:background 0.15s;
}
.back-btn:hover { background:#EDE5DC; }

/* PROGRESS */
.prog-wrap { width:100%; max-width:520px; margin-bottom:14px; }
.prog-bar { height:9px; background:#EDE5DC; border-radius:5px; overflow:hidden; }
.prog-fill {
  height:100%; border-radius:5px;
  transition:width 0.5s cubic-bezier(.4,0,.2,1);
}
.prog-fill.start-mode { background:linear-gradient(90deg,var(--coral),var(--yellow)); }
.prog-fill.end-mode   { background:linear-gradient(90deg,var(--teal),#A8EDD8); }
.prog-label { text-align:center; font-size:0.78rem; color:var(--muted); font-weight:600; margin-top:4px; }

/* GAME CARD */
.game-card {
  background:var(--card); border-radius:var(--radius);
  padding:18px 14px 16px; width:100%; max-width:520px;
  box-shadow:var(--shadow);
}
.instructions { text-align:center; font-size:0.9rem; color:var(--muted); margin-bottom:12px; font-weight:600; }

/* PICS */
.pics-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:9px; margin-bottom:14px; }
.pic-card {
  background:var(--bg); border:3px solid #E8DDD3; border-radius:14px;
  padding:9px 4px 7px;
  display:flex; flex-direction:column; align-items:center; gap:3px;
  cursor:pointer; position:relative;
  transition:transform 0.15s, border-color 0.15s, background 0.15s;
  touch-action:manipulation; min-height:86px; justify-content:center;
}
.pic-card:hover { border-color:var(--teal); transform:scale(1.04); }
.pic-card.selected-start { border-color:var(--coral); background:#FFF0E8; transform:scale(1.06); box-shadow:0 0 0 3px rgba(255,107,53,0.22); }
.pic-card.selected-end   { border-color:var(--teal);  background:#E8FAF7; transform:scale(1.06); box-shadow:0 0 0 3px rgba(61,191,168,0.22); }
.pic-card.matched  { border-color:var(--green); background:#EDFBEF; cursor:default; animation:pop 0.4s ease; }
.pic-card.wrong-flash { animation:shake 0.4s ease; }
.pic-emoji { font-size:2.4rem; line-height:1; }
.pic-word  { font-size:0.73rem; font-weight:700; color:var(--text); text-align:center; }
.pic-check { position:absolute; top:4px; left:5px; font-size:0.9rem; display:none; }
.pic-card.matched .pic-check { display:block; }

hr.div { border:none; border-top:2px dashed #E8DDD3; margin:2px 0 12px; }

/* LETTERS */
.letters-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:9px; }
.letter-btn {
  background:var(--bg); border:3px solid #E8DDD3; border-radius:13px;
  padding:13px 6px; font-size:2.2rem; font-weight:900;
  font-family:'Rubik',sans-serif; color:var(--text);
  cursor:pointer; text-align:center;
  transition:transform 0.15s, border-color 0.15s, background 0.15s;
  touch-action:manipulation;
  unicode-bidi:plaintext;
  direction:rtl;
}
.letter-btn:hover { border-color:var(--teal); transform:scale(1.05); }
.letter-btn.matched { border-color:var(--green); background:#EDFBEF; color:var(--green); cursor:default; }
.letter-btn.wrong-flash { animation:shake 0.4s ease; border-color:var(--red); background:#FFECEC; }

.feedback-bar { text-align:center; font-size:1.05rem; font-weight:700; min-height:32px; margin-top:12px; }

/* ROUND COMPLETE / END */
.round-complete, .end-screen { text-align:center; padding:8px 0 4px; }
.rc-emoji, .end-trophy { font-size:4rem; animation:bounceIn 0.5s ease; }
.rc-title  { font-size:1.5rem; font-weight:900; margin:10px 0 5px; }
.rc-title.start-mode { color:var(--coral); }
.rc-title.end-mode   { color:var(--teal); }
.end-title { font-size:1.7rem; font-weight:900; margin:10px 0 5px; }
.end-title.start-mode { color:var(--coral); }
.end-title.end-mode   { color:var(--teal); }
.rc-sub, .end-sub { font-size:0.93rem; color:var(--muted); margin-bottom:16px; line-height:1.7; }
.end-stars { font-size:1.5rem; margin-bottom:8px; }

.action-btns { display:flex; flex-direction:column; gap:10px; align-items:center; margin-top:10px; }
.next-btn {
  color:#fff; border:none; border-radius:50px; padding:13px 34px;
  font-size:1rem; font-weight:700; font-family:'Rubik',sans-serif;
  cursor:pointer; transition:transform 0.15s; width:100%; max-width:280px;
}
.next-btn.primary-start { background:var(--coral); box-shadow:0 4px 14px rgba(255,107,53,0.32); }
.next-btn.primary-end   { background:var(--teal);  box-shadow:0 4px 14px rgba(61,191,168,0.32); }
.next-btn.secondary { background:#B48FE0; box-shadow:0 4px 14px rgba(180,143,224,0.32); }
.next-btn.home-btn  { background:#AAA; box-shadow:none; }
.next-btn:hover { transform:scale(1.04); }

/* ANIMATIONS */
@keyframes bounceIn { 0%{transform:scale(0.4);opacity:0} 70%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }
@keyframes pop { 0%{transform:scale(1)} 40%{transform:scale(1.15)} 100%{transform:scale(1)} }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }


/* ═══ RACE GAME ═══ */
.race-wrap {
  width:100%;
  display:flex; flex-direction:column; align-items:center; gap:8px;
  padding:0;
}
.race-board {
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px; width:100%; padding:16px;
  background:rgba(255,255,255,0.92);
  border-radius:22px; border:3px solid #86efac;
  box-shadow:0 8px 24px rgba(0,0,0,0.08);
  position:relative;
}
.rtile {
  aspect-ratio:1/1; border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  font-size:2.5rem; background:#fff;
  box-shadow:inset 0 -3px 0 rgba(0,0,0,0.05);
}
.rtile-start { background:#22c55e; color:#fff; font-size:0.9rem; font-weight:900; }
.rtile-finish { background:#ef4444; color:#fff; font-size:0.9rem; font-weight:900; }
.rtile-player {
  outline:3px solid #f97316;
  outline-offset:2px;
}
.race-controls {
  width:100%; max-width:360px;
  background:rgba(255,255,255,0.92);
  padding:12px 16px; border-radius:20px;
  box-shadow:0 4px 16px rgba(0,0,0,0.08);
  display:flex; align-items:center; justify-content:space-around;
  gap:12px;
}
.dice-box {
  width:52px; height:52px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  border-radius:14px; display:flex; align-items:center; justify-content:center;
  font-size:1.8rem; color:#fff; font-weight:900;
  box-shadow:0 5px 0 #15803d; cursor:pointer;
  transition:transform 0.1s, box-shadow 0.1s;
  touch-action:manipulation;
}
.dice-box:active { transform:translateY(4px); box-shadow:0 1px 0 #15803d; }
.roll-btn {
  background:#f97316; color:#fff; border:none;
  border-radius:16px; padding:12px 24px;
  font-size:1rem; font-weight:900; font-family:'Rubik',sans-serif;
  box-shadow:0 5px 0 #c2410c; cursor:pointer;
  transition:transform 0.1s, box-shadow 0.1s;
  touch-action:manipulation; flex:1;
}
.roll-btn:active { transform:translateY(4px); box-shadow:0 1px 0 #c2410c; }
.roll-btn:disabled { opacity:0.5; cursor:default; }
.race-modal {
  position:fixed; inset:0;
  background:rgba(20,83,45,0.75); backdrop-filter:blur(6px);
  display:flex; align-items:center; justify-content:center;
  z-index:1000; padding:12px;
}
.race-modal.hidden { display:none; }
.race-modal-box {
  background:#fff; border-radius:28px;
  padding:18px 14px; width:100%; max-width:360px;
  display:flex; flex-direction:column; align-items:center; gap:12px;
  box-shadow:0 20px 50px rgba(0,0,0,0.2);
}
.race-speak-btn {
  background:#fef08a; border:none; border-bottom:5px solid #ca8a04;
  border-radius:14px; padding:10px 16px; width:100%;
  font-size:0.95rem; font-weight:900; font-family:'Rubik',sans-serif;
  color:#14532d; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px;
  touch-action:manipulation;
}
.race-emoji-box {
  background:#f0fdf4; border:2px solid #bbf7d0;
  border-radius:18px; width:100%; min-height:120px;
  display:flex; align-items:center; justify-content:center;
  font-size:5rem;
}
.race-opts { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; width:100%; }
.race-opt-btn {
  background:#dcfce7; border:none; border-bottom:4px solid #86efac;
  border-radius:14px; padding:14px 8px;
  font-size:2rem; font-weight:900; font-family:'Rubik',sans-serif;
  color:#14532d; cursor:pointer;
  transition:transform 0.1s;
  touch-action:manipulation;
}
.race-opt-btn:active { transform:translateY(3px); border-bottom-width:1px; }
.race-opt-btn.correct { background:#bbf7d0; border-color:#22c55e; }
.race-opt-btn.wrong   { background:#fee2e2; border-color:#f87171; }
.race-win {
  position:fixed; inset:0; background:#f97316;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:2000; color:#fff;
}
.race-win.hidden { display:none; }
.race-win-emoji { font-size:6rem; animation:bounceIn 0.5s ease; }
.race-win-title { font-size:2.5rem; font-weight:900; margin:12px 0; }
.gender-screen {
  position:fixed; inset:0; background:rgba(0,0,0,0.88);
  backdrop-filter:blur(8px);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:3000; color:#fff; gap:28px;
}
.gender-screen.hidden { display:none; }
.gender-title { font-size:1.8rem; font-weight:900; text-align:center; }
.gender-btns { display:flex; gap:20px; }
.gender-btn {
  background:#fff; color:#14532d; border:none;
  border-radius:20px; padding:18px 20px; width:120px;
  font-size:1rem; font-weight:900; font-family:'Rubik',sans-serif;
  display:flex; flex-direction:column; align-items:center; gap:6px;
  box-shadow:0 8px 0 #d1d5db; cursor:pointer;
  touch-action:manipulation;
}

#confetti { position:fixed; inset:0; pointer-events:none; z-index:999; overflow:hidden; }
.credit {
  width:100%; max-width:520px;
  text-align:center;
  margin-top:18px;
  padding: 10px 16px;
  background: rgba(255,255,255,0.7);
  border-radius: 14px;
  font-size:0.82rem;
  color: var(--muted);
  line-height: 1.6;
}
.credit strong { color: var(--coral); font-size:0.9rem; }
.history-box {
  background:#F8F4EF; border-radius:16px; padding:14px 16px;
  margin:14px 0 4px; width:100%;
}
.history-title { font-size:0.85rem; font-weight:700; color:var(--muted); margin-bottom:10px; }
.history-row {
  display:flex; align-items:center; justify-content:space-between;
  font-size:0.82rem; padding:4px 0;
  border-bottom:1px solid #EDE5DC;
}
.history-row:last-child { border-bottom:none; }
.history-date { color:var(--muted); flex:1; }
.history-score { font-weight:700; color:var(--text); }
.history-delta { font-weight:700; font-size:0.8rem; min-width:40px; text-align:left; }
.history-errors { font-size:0.8rem; color:#FF5C5C; font-weight:700; min-width:40px; text-align:center; }
.title-icon { width:2.4rem; height:2.4rem; object-fit:contain; vertical-align:middle; margin-left:6px; }
.mode-icon  { width:3.6rem; height:3.6rem; object-fit:contain; border-radius:8px; }
.delta-up   { color:#5CC869; }
.delta-down { color:#FF5C5C; }
.delta-same { color:var(--muted); }
.improvement-banner {
  border-radius:12px; padding:10px 14px; margin:10px 0;
  font-size:1rem; font-weight:700; text-align:center;
}
.imp-up   { background:#EDFBEF; color:#5CC869; }
.imp-down { background:#FFF0F0; color:#FF5C5C; }
.imp-same { background:#F8F4EF; color:var(--muted); }

.cp { position:absolute; border-radius:3px; animation:fall linear forwards; }
@keyframes fall { 0%{opacity:1;transform:translateY(-20px) rotate(0deg)} 100%{opacity:0;transform:translateY(105vh) rotate(540deg)} }
</style>
</head>
<body>
<div id="app"></div>
<div id="confetti"></div>
<div class="credit">עוצב ונבנה על ידי<br><strong>לילך כספרי</strong><br>קלינאית תקשורת</div>

function shuffle(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;} return a; }
function say(text){ if(!window.speechSynthesis)return; var u=new SpeechSynthesisUtterance(text); u.lang='he-IL'; u.rate=0.82; speechSynthesis.cancel(); speechSynthesis.speak(u); }
function iconImg(cls){
  var img=document.createElement('img');
  img.src=ALEF_ICON; img.className=cls;
  return img;
}
function el(tag,cls,txt){ var e=document.createElement(tag); if(cls)e.className=cls; if(txt!==undefined)e.textContent=txt; return e; }
function app(){ return document.getElementById('app'); }
function clear(){ var a=app(); while(a.firstChild)a.removeChild(a.firstChild); }

function buildWordSet(){
  var bank = mode==='start' ? BANK_START : BANK_END;
  var letters = mode==='start' ? LETTERS_START : LETTERS_END;
  return letters.map(function(l){
    var opts=bank[l];
    var picked=opts[gameIndex % opts.length];
    return { e:picked.e, w:picked.w, l:l };
  });
}

function modeClass(){ return mode+'-mode'; }
function accentColor(){ return mode==='start' ? '#FF6B35' : '#3DBFA8'; }
function accentClass(){ return mode==='start' ? 'primary-start' : 'primary-end'; }
function gameTitle(){ return mode==='start' ? 'אות פותחת' : 'אות סוגרת'; }
function gameQuestion(){ return mode==='start' ? 'לחצו על תמונה ואז על האות שמתחילה אותה 👇' : 'לחצו על תמונה ואז על האות שמסיימת אותה 👇'; }

function startGame(){
  correctCount=0; errorCount=0;
  var words=shuffle(buildWordSet());
  rounds=[]; for(var i=0;i<words.length;i+=PER) rounds.push(words.slice(i,i+PER));
  totalRounds=rounds.length; currentRound=0; totalWords=words.length;
  startRound();
}

function startRound(){
  roundItems=rounds[currentRound]; selectedPic=null; matchedCount=0;
  renderRound();
}

function selectPic(idx){
  if(selectedPic!==null){
    var prev=document.getElementById('pic-'+selectedPic);
    if(prev&&prev.dataset.matched==='0'){ prev.classList.remove('selected-start'); prev.classList.remove('selected-end'); }
  }
  selectedPic=idx;
  var ep=document.getElementById('pic-'+idx);
  if(ep) ep.classList.add('selected-'+mode);
  setFb('');
}

function selectLetter(letter){
  if(selectedPic===null){ setFb('קודם בחרו תמונה! 👆','#AAA'); return; }
  var picEl=document.getElementById('pic-'+selectedPic);
  if(!picEl||picEl.dataset.matched==='1') return;
  var correct=roundItems[selectedPic].l;
  if(letter===correct){
    picEl.dataset.matched='1';
    picEl.classList.remove('selected-start'); picEl.classList.remove('selected-end');
    picEl.classList.add('matched');
    var lb=document.getElementById('lbtn-'+letter);
    if(lb){ lb.classList.add('matched'); lb.disabled=true; }
    selectedPic=null; matchedCount++; correctCount++;
    confettiPop(10);
    var msgs=['מצוין! ✨','כל הכבוד! 🌟','יופי! 🎉','נהדר! ⭐','אחלה! 🥳'];
    setFb(msgs[Math.floor(Math.random()*msgs.length)],'#5CC869');
    if(matchedCount===roundItems.length) setTimeout(renderRoundComplete,900);
  } else {
    picEl.classList.add('wrong-flash'); setTimeout(function(){ picEl.classList.remove('wrong-flash'); },440);
    var lb2=document.getElementById('lbtn-'+letter);
    if(lb2){ lb2.classList.add('wrong-flash'); setTimeout(function(){ lb2.classList.remove('wrong-flash'); },440); }
    errorCount++; setFb('נסו שוב! 💪','#FF5C5C');
  }
}

function setFb(txt,color){ var fb=document.getElementById('fb'); if(!fb)return; fb.textContent=txt; fb.style.color=color||'#AAA'; }

function updateProgress(){
  var pf=document.getElementById('pf'); var pl=document.getElementById('pl');
  var done=currentRound*PER;
  if(pf) pf.style.width=(done/totalWords*100)+'%';
  if(pl) pl.textContent=done+' מתוך '+totalWords+' מילים';
}

function renderRoundComplete(){
  confettiPop(40);
  var isLast=(currentRound>=totalRounds-1);
  var card=document.getElementById('card');
  while(card.firstChild) card.removeChild(card.firstChild);
  var rc=el('div','round-complete');
  rc.appendChild(el('div','rc-emoji','🎉'));
  var rtt=el('div','rc-title '+modeClass(),'סבב '+(currentRound+1)+' הושלם!'); rc.appendChild(rtt);
  rc.appendChild(el('div','rc-sub', isLast?'עברתם את כל הסבבים! 🏆':'כל הכבוד! מוכנים לסבב הבא?'));
  var ab=el('div','action-btns');
  var nb=el('button','next-btn '+accentClass(), isLast?'🏆 לתוצאות':'הסבב הבא ←');
  nb.onclick=isLast?renderEnd:function(){
    currentRound++;
    updateProgress();
    var ri=document.querySelector('.round-info');
    if(ri) ri.textContent='סבב '+(currentRound+1)+' / '+totalRounds;
    startRound();
  };
  ab.appendChild(nb);
  rc.appendChild(ab);
  card.appendChild(rc);
}

function renderEnd(){
  var history = saveScore(correctCount, totalWords, errorCount);
  var pf=document.getElementById('pf'); if(pf) pf.style.width='100%';
  var pl=document.getElementById('pl'); if(pl) pl.textContent=totalWords+' מתוך '+totalWords+' מילים';
  confettiPop(70);
  var card=document.getElementById('card');
  while(card.firstChild) card.removeChild(card.firstChild);
  var end=el('div','end-screen');
  end.appendChild(el('div','end-trophy','🏆'));
  var et=el('div','end-title '+modeClass(),'כל הכבוד! סיימתם!'); end.appendChild(et);
  end.appendChild(el('div','end-stars','⭐⭐⭐'));
  var sub=el('div','end-sub'); sub.innerHTML='עברתם <strong>'+totalRounds+'</strong> סבבים<br>וזיהיתם <strong>'+totalWords+'</strong> מילים!'; end.appendChild(sub);

  var impBanner = renderImprovementBanner(history);
  if(impBanner) end.appendChild(impBanner);

  var histBox = renderHistoryBox(history);
  if(histBox) end.appendChild(histBox);

  var ab=el('div','action-btns');

  var b1=el('button','next-btn '+accentClass(),'🔄 שחקו שוב');
  b1.onclick=startGame; ab.appendChild(b1);

  var b2=el('button','next-btn secondary','🎲 מילים חדשות');
  b2.onclick=function(){ gameIndex++; startGame(); }; ab.appendChild(b2);

  var b3=el('button','next-btn home-btn','🏠 בית');
  b3.onclick=renderHome; ab.appendChild(b3);

  end.appendChild(ab);
  card.appendChild(end);
}

function confettiPop(n){
  var colors=['#FF6B35','#3DBFA8','#FFD166','#5CC869','#B48FE0','#5B9EF5'];
  var layer=document.getElementById('confetti');
  for(var i=0;i<n;i++){
    (function(i){ setTimeout(function(){
      var p=document.createElement('div'); p.className='cp';
      p.style.left=(Math.random()*100)+'vw'; p.style.top='-20px';
      p.style.width=(7+Math.random()*10)+'px'; p.style.height=(7+Math.random()*10)+'px';
      p.style.background=colors[Math.floor(Math.random()*colors.length)];
      p.style.animationDuration=(0.8+Math.random()*1)+'s';
      layer.appendChild(p);
      setTimeout(function(){ if(p.parentNode)p.parentNode.removeChild(p); },2200);
    },i*28); })(i);
  }
}

function getStorageKey(){
  return 'ot_progress_' + (mode || 'unknown');
}

function saveScore(correct, total, errors){
  var key = getStorageKey();
  var history = [];
  try { history = JSON.parse(localStorage.getItem(key)) || []; } catch(e){}
  var now = new Date();
  var dateStr = now.getDate()+'/'+(now.getMonth()+1)+'/'+now.getFullYear();
  history.push({ date:dateStr, correct:correct, total:total, errors:errors, ts:Date.now() });
  if(history.length > 10) history = history.slice(-10); // keep last 10
  try { localStorage.setItem(key, JSON.stringify(history)); } catch(e){}
  return history;
}

function getHistory(){
  var key = getStorageKey();
  try { return JSON.parse(localStorage.getItem(key)) || []; } catch(e){ return []; }
}

function renderHistoryBox(history){
  if(history.length < 2) return null;
  var box = el('div','history-box');
  box.appendChild(el('div','history-title','📊 היסטוריה'));
  var last5 = history.slice(-5).reverse();
  last5.forEach(function(entry, i){
    var row = el('div','history-row');
    var dateEl = el('div','history-date', entry.date);
    var scoreEl = el('div','history-score', entry.correct+'/'+entry.total);
    var errorsEl = el('div','history-errors', '❌ '+(entry.errors||0)+' שגיאות');
    var deltaEl = el('div','history-delta');
    if(i < last5.length-1){
      var prev = last5[i+1].correct;
      var diff = entry.correct - prev;
      var errDiff = (entry.errors||0) - (last5[i+1].errors||0);
      if(diff > 0){ deltaEl.textContent='▲+'+diff; deltaEl.className='history-delta delta-up'; }
      else if(diff < 0){ deltaEl.textContent='▼'+diff; deltaEl.className='history-delta delta-down'; }
      else { deltaEl.textContent='–'; deltaEl.className='history-delta delta-same'; }
    }
    row.appendChild(dateEl); row.appendChild(scoreEl); row.appendChild(errorsEl); row.appendChild(deltaEl);
    box.appendChild(row);
  });
  return box;
}

function renderImprovementBanner(history){
  if(history.length < 2) return null;
  var latest = history[history.length-1].correct;
  var prev = history[history.length-2].correct;
  var diff = latest - prev;
  var banner = el('div','improvement-banner');
  var prevErrors = history[history.length-2].errors||0;
  var latestErrors = history[history.length-1].errors||0;
  var errDiff = latestErrors - prevErrors;
  var errTxt = errDiff < 0 ? ' ופחות '+Math.abs(errDiff)+' טעויות' : errDiff > 0 ? ' ו-'+errDiff+' טעויות יותר' : '';
  if(diff > 0){ banner.className='improvement-banner imp-up'; banner.textContent='🎉 השתפרת ב-'+diff+' נקודות'+errTxt+'!'; }
  else if(diff < 0){ banner.className='improvement-banner imp-down'; banner.textContent='💪 ירדת ב-'+Math.abs(diff)+' נקודות'+errTxt+' — נסו שוב!'; }
  else if(errDiff < 0){ banner.className='improvement-banner imp-up'; banner.textContent='🌟 אותו ניקוד אבל פחות '+Math.abs(errDiff)+' טעויות — כל הכבוד!'; }
  else { banner.className='improvement-banner imp-same'; banner.textContent='👍 אותה תוצאה כמו הפעם הקודמת!'; }
  return banner;
}

function raceSpeak(text){
  if(!window.speechSynthesis) return Promise.resolve();
  return new Promise(function(resolve){
    window.speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance(text);
    u.lang='he-IL'; u.rate=0.88; u.pitch=1.1;
    u.onend=resolve;
    window.speechSynthesis.speak(u);
    setTimeout(resolve,5000);
  });
}

function renderRaceBoard(){

  var wrap=el('div','race-wrap');

  // Board
  var board=el('div','race-board'); board.id='raceBoard';
  raceBoardData.forEach(function(tile,i){
    var row=Math.floor(i/5), col=i%5;
    var gridX=(row%2===0)?col+1:5-col;

  pi.textContent=(raceGender==='boy'?'👦 שחקן':'👧 שחקנית')+' | משבצת '+(racePos+1)+' מתוך '+raceBoardData.length;

  // Controls
  var ctrl=el('div','race-controls');
  var dice=el('div','dice-box','🎲'); dice.id='raceDice';
  var rollBtn=el('button','roll-btn','הטל קוביה!'); rollBtn.id='raceRollBtn';
  rollBtn.onclick=raceRoll;
  ctrl.appendChild(dice); ctrl.appendChild(rollBtn);
  wrap.appendChild(ctrl);

  app().appendChild(wrap);

  // Modal (question)
  var modal=el('div','race-modal hidden'); modal.id='raceModal';
  var mbox=el('div','race-modal-box');
  var spkBtn=el('button','race-speak-btn'); spkBtn.id='raceSpkBtn';
  spkBtn.innerHTML='<span id="raceSpkLabel">שמע שוב</span><span>🔊</span>';
  spkBtn.onclick=function(){ raceSpeak(raceSpeech); };
  mbox.appendChild(spkBtn);
  var eboxWrap=el('div','race-emoji-box'); var espan=el('span',''); espan.id='raceQEmoji'; eboxWrap.appendChild(espan); mbox.appendChild(eboxWrap);
  var qsub=el('div',''); qsub.id='raceQSub'; qsub.style.cssText='text-align:center;font-weight:700;color:#14532d;font-size:0.9rem;margin-top:4px;'; mbox.appendChild(qsub);
  var opts=el('div','race-opts'); opts.id='raceOpts'; mbox.appendChild(opts);
  var fb=el('div',''); fb.id='raceFb'; fb.style.cssText='min-height:24px;text-align:center;font-weight:700;font-size:0.95rem;'; mbox.appendChild(fb);
  modal.appendChild(mbox);
  app().appendChild(modal);

  // Win screen
  var win=el('div','race-win hidden'); win.id='raceWin';
  win.appendChild(el('div','race-win-emoji','🏆'));
  win.appendChild(el('div','race-win-title','ניצחת!'));
  var wb=el('button','next-btn','🔄 משחק חדש'); wb.style.marginTop='20px'; wb.onclick=startRaceGame; win.appendChild(wb);
  var wb2=el('button','next-btn home-btn','🏠 בית'); wb2.style.marginTop='10px'; wb2.onclick=renderHome; win.appendChild(wb2);
  app().appendChild(win);
}

function updateRacePlayer(){
  document.querySelectorAll('.rtile').forEach(function(t){ t.classList.remove('rtile-player'); });
  var t=document.getElementById('rtile-'+racePos);
  if(t) t.classList.add('rtile-player');
  var pi=document.getElementById('racePlayerInfo');
  if(pi) pi.textContent=(raceGender==='boy'?'👦 שחקן':'👧 שחקנית')+' | משבצת '+(racePos+1)+' מתוך '+raceBoardData.length;
}

async function raceRoll(){
  if(raceMoving) return;
  raceMoving=true;
  var rb=document.getElementById('raceRollBtn'); if(rb) rb.disabled=true;
  var dice=document.getElementById('raceDice');
  var num=Math.floor(Math.random()*3)+1;
  for(var i=0;i<8;i++){ if(dice) dice.textContent=Math.floor(Math.random()*6)+1; await new Promise(function(r){setTimeout(r,80);}); }
  if(dice) dice.textContent=num;
  for(var j=0;j<num;j++){
    if(racePos<raceBoardData.length-1){ racePos++; updateRacePlayer(); await new Promise(function(r){setTimeout(r,450);}); }
  }
  var tile=raceBoardData[racePos];
  if(tile.type==='finish'){
    var win=document.getElementById('raceWin'); if(win) win.classList.remove('hidden');
    raceSpeak('כל הכבוד! נִצַּחְתָּ במרוץ! ' + (raceGender==='girl' ? 'לָךְ' : 'לְךָ'));
  } else if(tile.word){
    showRaceQuestion(tile);
  } else {
    raceMoving=false;
    if(rb) rb.disabled=false;
  }
}

function showRaceQuestion(data){
  var typeT=data.type==='opening'?'מתחילה':'נגמרת';
  raceSpeech='באיזו אות '+typeT+' המילה '+data.word+'?';
  var modal=document.getElementById('raceModal'); if(modal) modal.classList.remove('hidden');
  var qe=document.getElementById('raceQEmoji'); if(qe) qe.textContent=data.emoji;
  var qs=document.getElementById('raceQSub'); if(qs) qs.textContent='באיזו אות '+typeT+' המילה הזו?';
  var fb=document.getElementById('raceFb'); if(fb) fb.textContent='';
  var opts=document.getElementById('raceOpts'); if(!opts) return;
  opts.innerHTML='';
  data.options.forEach(function(o){
    var btn=el('button','race-opt-btn',o);
    btn.onclick=async function(){
      if(o===data.correct){
        btn.classList.add('correct');
        var msgs=['נכון מאוד! 🌟','כל הכבוד! ✨','מצוין! 🎉','אחלה! ⭐'];
        var fb2=document.getElementById('raceFb'); if(fb2) fb2.style.color='#16a34a';
        if(fb2) fb2.textContent=msgs[Math.floor(Math.random()*msgs.length)];
        await raceSpeak('נכון מאוד! כל הכבוד ' + (raceGender==='girl' ? 'לָךְ' : 'לְךָ') + '!');
        var modal2=document.getElementById('raceModal'); if(modal2) modal2.classList.add('hidden');
        raceMoving=false;
        var rb=document.getElementById('raceRollBtn'); if(rb) rb.disabled=false;
        var d=document.getElementById('raceDice'); if(d) d.textContent='🎲';
      } else {
        btn.classList.add('wrong');
        setTimeout(function(){ btn.classList.remove('wrong'); },500);
        var fb3=document.getElementById('raceFb'); if(fb3) fb3.style.color='#dc2626';
        if(fb3) fb3.textContent='נסו שוב! 💪';
        raceSpeak(raceGender==='boy'?'זה לא נכון, נסה שוב!':'זה לא נכון, נסי שוב!');
      }
    };
    opts.appendChild(btn);
  });
  raceSpeak(raceSpeech);
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
renderHome();
</script>
