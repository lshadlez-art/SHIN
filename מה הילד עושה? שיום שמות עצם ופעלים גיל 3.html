<title>מה הוא עושה? 🎬</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Heebo:wght@400;600&display=swap');

:root {
  --bg: #1a1a2e;
  --card: #16213e;
  --accent1: #f5a623;
  --accent2: #e84393;
  --accent3: #4ecdc4;
  --accent4: #a8e063;
  --text: #f0f0f0;
  --soft: #8888aa;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Heebo', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  background-image:
    radial-gradient(ellipse at 10% 0%, #f5a62322 0%, transparent 50%),
    radial-gradient(ellipse at 90% 100%, #e8439322 0%, transparent 50%);
}

/* HEADER */
header {
  text-align: center;
  padding: 30px 20px 10px;
}

header h1 {
  font-family: 'Baloo 2', cursive;
  font-size: clamp(2rem, 6vw, 3.5rem);
  font-weight: 800;
  color: var(--accent1);
  text-shadow: 0 0 30px #f5a62355;
  line-height: 1.1;
}

header p {
  color: var(--soft);
  margin-top: 6px;
  font-size: 1rem;
}

/* MODE TABS */
.tabs {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin: 20px auto 0;
  padding: 0 20px;
  flex-wrap: wrap;
}

.tab {
  background: rgba(255,255,255,0.07);
  border: 2px solid rgba(255,255,255,0.12);
  color: var(--soft);
  font-family: 'Baloo 2', cursive;
  font-size: 1rem;
  padding: 10px 22px;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.2s;
}

.tab.active {
  background: var(--accent1);
  border-color: var(--accent1);
  color: #1a1a2e;
}

/* SCENE AREA */
.scene-wrap {
  max-width: 900px;
  margin: 24px auto 0;
  padding: 0 20px;
}

.scene-card {
  background: var(--card);
  border-radius: 32px;
  padding: 30px 28px 36px;
  border: 2px solid rgba(255,255,255,0.08);
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  position: relative;
  overflow: hidden;
}

.scene-card::before {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 200px; height: 200px;
  border-radius: 50%;
  background: radial-gradient(circle, #f5a62318, transparent);
  pointer-events: none;
}

/* Big emoji scene */
.big-scene {
  text-align: center;
  padding: 10px 0 20px;
}

.scene-emoji {
  font-size: clamp(7rem, 18vw, 11rem);
  line-height: 1;
  filter: drop-shadow(0 8px 20px rgba(0,0,0,0.4));
  display: block;
  transition: transform 0.3s;
  animation: floatIn 0.5s ease;
}

@keyframes floatIn {
  from { transform: scale(0.5) translateY(30px); opacity: 0; }
  to { transform: scale(1) translateY(0); opacity: 1; }
}

.scene-emoji.bounce {
  animation: bigBounce 0.6s ease;
}

@keyframes bigBounce {
  0% { transform: scale(1); }
  30% { transform: scale(1.2) rotate(-5deg); }
  60% { transform: scale(0.95) rotate(3deg); }
  100% { transform: scale(1); }
}

/* Question */
.question-box {
  text-align: center;
  margin: 16px 0 24px;
}

.question-label {
  display: inline-block;
  background: rgba(255,255,255,0.06);
  border-radius: 50px;
  padding: 8px 24px;
  font-family: 'Baloo 2', cursive;
  font-size: clamp(1.1rem, 3vw, 1.5rem);
  color: var(--soft);
  letter-spacing: 0.5px;
}

/* Answer choices */
.choices {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 18px;
}

.choice-btn {
  background: rgba(255,255,255,0.06);
  border: 2.5px solid rgba(255,255,255,0.12);
  border-radius: 24px;
  padding: 28px 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: all 0.18s;
  font-family: 'Baloo 2', cursive;
  color: var(--text);
  font-size: clamp(1.2rem, 4vw, 1.7rem);
}

.choice-btn .cho-emoji {
  font-size: clamp(3.5rem, 9vw, 5rem);
}

.choice-btn:hover {
  background: rgba(255,255,255,0.12);
  transform: translateY(-3px);
  border-color: rgba(255,255,255,0.25);
}

.choice-btn.correct {
  background: #a8e06330;
  border-color: var(--accent4);
  animation: correctPop 0.5s ease;
}

.choice-btn.wrong {
  background: #e8439320;
  border-color: var(--accent2);
  animation: shake 0.4s ease;
}

@keyframes correctPop {
  0% { transform: scale(1); }
  40% { transform: scale(1.08); }
  100% { transform: scale(1); }
}

@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}

/* Reveal answer */
.reveal-box {
  text-align: center;
  margin-top: 20px;
  min-height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 6px;
}

.reveal-text {
  font-family: 'Baloo 2', cursive;
  font-size: clamp(1.6rem, 5vw, 2.4rem);
  font-weight: 800;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.35s;
}

.reveal-text.show {
  opacity: 1;
  transform: translateY(0);
}

.reveal-sub {
  color: var(--soft);
  font-size: 0.95rem;
  opacity: 0;
  transition: opacity 0.3s 0.2s;
}

.reveal-sub.show { opacity: 1; }

/* Nav buttons */
.nav-row {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin-top: 24px;
}

.nav-btn {
  background: var(--accent3);
  color: #1a1a2e;
  border: none;
  border-radius: 50px;
  font-family: 'Baloo 2', cursive;
  font-size: 1.1rem;
  padding: 13px 32px;
  cursor: pointer;
  box-shadow: 0 5px 0 #2e9b94;
  transition: transform 0.1s, box-shadow 0.1s;
  font-weight: 700;
}

.nav-btn:active {
  transform: translateY(3px);
  box-shadow: 0 2px 0 #2e9b94;
}

.nav-btn.speak {
  background: var(--accent1);
  box-shadow: 0 5px 0 #b87b10;
}

.nav-btn.speak:active {
  box-shadow: 0 2px 0 #b87b10;
}

/* Progress dots */
.progress-row {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-top: 20px;
}

.dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  transition: all 0.3s;
}

.dot.active { background: var(--accent1); transform: scale(1.3); }
.dot.done { background: var(--accent4); }

/* Celebration */
.celebrate {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(26,26,46,0.95);
  z-index: 100;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  text-align: center;
  padding: 30px;
}

.celebrate.show { display: flex; animation: fadeIn 0.4s ease; }

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.9); }
  to { opacity: 1; transform: scale(1); }
}

.celebrate h2 {
  font-family: 'Baloo 2', cursive;
  font-size: clamp(2.5rem, 8vw, 4.5rem);
  color: var(--accent1);
  line-height: 1.1;
}

.celebrate p { color: var(--soft); font-size: 1.2rem; }

.confetti-row {
  font-size: 3rem;
  animation: bounce 0.7s ease infinite alternate;
}

@keyframes bounce {
  from { transform: translateY(0); }
  to { transform: translateY(-14px); }
}

/* Therapist hint */
.hint-pill {
  display: inline-block;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 50px;
  padding: 5px 16px;
  font-size: 0.82rem;
  color: var(--soft);
  margin: 14px auto 0;
  display: block;
  text-align: center;
  max-width: 500px;
}

.hint-pill strong { color: var(--accent3); }
</style>
</head>
<body>

<header>
  <h1>🎬 מה הוא עושה?</h1>
  <p>שיום פעלים ושמות עצם לגיל 3-4</p>
</header>

<div class="tabs">
  <button class="tab active" onclick="setMode(&#39;verbs&#39;)">🏃 פעלים</button>
  <button class="tab" onclick="setMode(&#39;nouns&#39;)">🧸 שמות עצם</button>
  <button class="tab" onclick="setMode(&#39;mixed&#39;)">🎲 מעורב</button>
</div>

<div class="scene-wrap">
  <div class="scene-card">

    <div class="big-scene">
      <span class="scene-emoji" id="sceneEmoji">🧒🏃</span>
    </div>

    <div class="question-box">
      <span class="question-label" id="questionLabel">מה הילד עוֹשֶׂה?</span>
    </div>

    <div class="choices" id="choicesGrid"><button class="choice-btn"><span class="cho-emoji">😴</span><span>יָשֵׁן</span></button><button class="choice-btn"><span class="cho-emoji">🏃</span><span>רץ</span></button></div>

    <div class="reveal-box">
      <div class="reveal-text" id="revealText"></div>
      <div class="reveal-sub" id="revealSub"></div>
    </div>

    <span class="hint-pill" id="hintPill"><strong>למטפל/ת:</strong> טיפ: אמרו יחד "הילד רץ רץ רץ!"</span>

  </div>

  <div class="progress-row" id="progressRow"><div class="dot active"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>

  <div class="nav-row">
    <button class="nav-btn speak" onclick="speakQuestion()">🔊 שמע שאלה</button>
    <button class="nav-btn" onclick="nextCard()">הבא ←</button>
  </div>
</div>

<div class="celebrate" id="celebrate">
  <div class="confetti-row">🌟🎉🌈🎉🌟</div>
  <h2>כל הכבוד!<br>עשינו את זה!</h2>
  <p>איזו קבוצה מדהימה!</p>
  <button class="nav-btn" style="margin-top:10px" onclick="restart()">שוב פעם! 🔄</button>
</div>

<script>
const VERBS = [
  { scene: '🧒🏃', question: 'מה הילד עוֹשֶׂה?', answer: 'רץ', answerEmoji: '🏃',
    choices: [
      { emoji: '🏃', label: 'רץ' },
      { emoji: '😴', label: 'יָשֵׁן' },
    ],
    hint: 'טיפ: אמרו יחד "הילד רץ רץ רץ!"',
    sub: 'פועל: רץ'
  },
  { scene: '👦🍎', question: 'מה הילד עוֹשֶׂה?', answer: 'אוכל', answerEmoji: '😋',
    choices: [
      { emoji: '😋', label: 'אוכל' },
      { emoji: '🚿', label: 'מתרחץ' },
    ],
    hint: 'טיפ: שאלו "מה אתם אוכלים הכי אוהבים?"',
    sub: 'פועל: אוכל'
  },
  { scene: '👧💧', question: 'מה הילדה עוֹשָׂה?', answer: 'שותה', answerEmoji: '🥤',
    choices: [
      { emoji: '🥤', label: 'שותה' },
      { emoji: '😴', label: 'יְשֵׁנָה' },
    ],
    hint: 'טיפ: חזרה על המשפט "הילדה שותה מים"',
    sub: 'פועל: שותה'
  },
  { scene: 'SVG_DRAW', question: 'מה הילד עוֹשֶׂה?', answer: 'מצייר', answerEmoji: '✏️',
    choices: [
      { emoji: '✏️', label: 'מצייר' },
      { emoji: '🏃', label: 'רץ' },
    ],
    hint: 'טיפ: שאלו "מה אתם מציירים בבית?"',
    sub: 'פועל: מצייר'
  },
  { scene: '👦😴', question: 'מה הילד עוֹשֶׂה?', answer: 'יָשֵׁן', answerEmoji: '💤',
    choices: [
      { emoji: '💤', label: 'יָשֵׁן' },
      { emoji: '🍽️', label: 'אוכל' },
    ],
    hint: 'טיפ: חיקוי — נרדמו כולם יחד!',
    sub: 'פועל: ישן'
  },
  { scene: '👧🎵', question: 'מה הילדה עוֹשָׂה?', answer: 'שָׁרָה', answerEmoji: '🎤',
    choices: [
      { emoji: '🎤', label: 'שָׁרָה' },
      { emoji: '🏃', label: 'רָצָה' },
    ],
    hint: 'טיפ: שרו יחד שיר אחד קצר!',
    sub: 'פועל: שרה'
  },
];

const NOUNS = [
  { scene: '🐕', question: 'מה זה?', answer: 'כלב', answerEmoji: '🐕',
    choices: [
      { emoji: '🐕', label: 'כלב' },
      { emoji: '🐱', label: 'חתול' },
    ],
    hint: 'טיפ: "הכלב אוהב לרוץ — מה עוד הכלב עושה?"',
    sub: 'שם עצם: כלב'
  },
  { scene: '🍎', question: 'מה זה?', answer: 'תפוח', answerEmoji: '🍎',
    choices: [
      { emoji: '🍎', label: 'תפוח' },
      { emoji: '🍌', label: 'בננה' },
    ],
    hint: 'טיפ: "תפוח — אדום או ירוק? מה הצבע אצלכם?"',
    sub: 'שם עצם: תפוח'
  },
  { scene: '🚗', question: 'מה זה?', answer: 'מכונית', answerEmoji: '🚗',
    choices: [
      { emoji: '🚗', label: 'מכונית' },
      { emoji: '✈️', label: 'מטוס' },
    ],
    hint: 'טיפ: "המכונית נוסעת — לאן?"',
    sub: 'שם עצם: מכונית'
  },
  { scene: '⚽', question: 'מה זה?', answer: 'כדור', answerEmoji: '⚽',
    choices: [
      { emoji: '⚽', label: 'כדור' },
      { emoji: '🎒', label: 'תיק' },
    ],
    hint: 'טיפ: "עם הכדור — בועטים? זורקים? מה עושים?"',
    sub: 'שם עצם: כדור'
  },
  { scene: '🌂', question: 'מה זה?', answer: 'מטריה', answerEmoji: '🌂',
    choices: [
      { emoji: '🌂', label: 'מטריה' },
      { emoji: '🧢', label: 'כובע' },
    ],
    hint: 'טיפ: "מתי לוקחים מטריה?" — גשם!',
    sub: 'שם עצם: מטריה'
  },
  { scene: '🪑', question: 'מה זה?', answer: 'כיסא', answerEmoji: '🪑',
    choices: [
      { emoji: '🪑', label: 'כיסא' },
      { emoji: '🛏️', label: 'מיטה' },
    ],
    hint: 'טיפ: "מה עושים על כיסא? יושבים!"',
    sub: 'שם עצם: כיסא'
  },
];

let mode = 'verbs';
let cards = [];
let index = 0;
let answered = false;

function setMode(m) {
  mode = m;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  restart();
}

function getCards() {
  if (mode === 'verbs') return [...VERBS];
  if (mode === 'nouns') return [...NOUNS];
  return shuffle([...VERBS, ...NOUNS]);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function restart() {
  cards = getCards();
  index = 0;
  document.getElementById('celebrate').classList.remove('show');
  renderCard();
}

function renderCard() {
  answered = false;
  const card = cards[index];

  // Scene
  const emojiEl = document.getElementById('sceneEmoji');
  if (card.scene === 'SVG_DRAW') {
    emojiEl.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="180" height="180" style="display:block;margin:auto">
      <!-- paper -->
      <rect x="55" y="60" width="95" height="110" rx="6" fill="white" stroke="#ddd" stroke-width="2"/>
      <!-- drawing on paper: colorful scribbles -->
      <path d="M70 130 Q85 110 100 125 Q115 140 130 120" stroke="#FF6B6B" stroke-width="4" fill="none" stroke-linecap="round"/>
      <circle cx="80" cy="100" r="10" fill="#FFD93D" opacity="0.8"/>
      <rect x="100" y="88" width="18" height="18" rx="3" fill="#4ECDC4" opacity="0.8"/>
      <path d="M72 148 L130 148" stroke="#A8E063" stroke-width="3" stroke-linecap="round"/>
      <!-- desk surface -->
      <rect x="30" y="168" width="145" height="14" rx="4" fill="#C8A97E"/>
      <!-- markers/crayons on desk -->
      <!-- red marker -->
      <rect x="38" y="148" width="10" height="30" rx="5" fill="#FF6B6B"/>
      <rect x="38" y="148" width="10" height="6" rx="3" fill="#cc3333"/>
      <!-- blue marker -->
      <rect x="52" y="150" width="10" height="28" rx="5" fill="#4ECDC4"/>
      <rect x="52" y="150" width="10" height="6" rx="3" fill="#2a9d8f"/>
      <!-- yellow crayon (held in hand) -->
      <g transform="rotate(-30, 148, 130)">
        <rect x="140" y="118" width="9" height="32" rx="4" fill="#FFD93D"/>
        <polygon points="140,118 149,118 144.5,108" fill="#e6b800"/>
      </g>
      <!-- boy body -->
      <!-- torso -->
      <rect x="88" y="28" width="28" height="32" rx="8" fill="#4A90D9"/>
      <!-- head -->
      <circle cx="102" cy="22" r="18" fill="#FDBCB4"/>
      <!-- hair -->
      <ellipse cx="102" cy="8" rx="18" ry="10" fill="#5C3D2E"/>
      <rect x="84" y="8" width="36" height="14" rx="4" fill="#5C3D2E"/>
      <!-- eyes -->
      <circle cx="95" cy="20" r="3" fill="white"/>
      <circle cx="109" cy="20" r="3" fill="white"/>
      <circle cx="96" cy="21" r="1.5" fill="#333"/>
      <circle cx="110" cy="21" r="1.5" fill="#333"/>
      <!-- smile -->
      <path d="M97 28 Q102 33 107 28" stroke="#c47" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <!-- left arm down on desk -->
      <rect x="72" y="48" width="14" height="36" rx="7" fill="#4A90D9" transform="rotate(15,79,66)"/>
      <!-- right arm reaching to paper -->
      <rect x="114" y="48" width="14" height="44" rx="7" fill="#4A90D9" transform="rotate(-25,121,70)"/>
      <!-- hands -->
      <circle cx="80" cy="82" r="7" fill="#FDBCB4"/>
      <circle cx="144" cy="112" r="7" fill="#FDBCB4"/>
    </svg>`;
    emojiEl.style.fontSize = '';
  } else {
    emojiEl.innerHTML = card.scene;
    emojiEl.style.fontSize = '';
  }
  emojiEl.className = 'scene-emoji bounce';
  setTimeout(() => emojiEl.classList.remove('bounce'), 600);

  // Question
  document.getElementById('questionLabel').textContent = card.question;

  // Choices
  const grid = document.getElementById('choicesGrid');
  grid.innerHTML = '';
  shuffle(card.choices).forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="cho-emoji">${c.emoji}</span><span>${c.label}</span>`;
    btn.onclick = () => onChoice(btn, c.label, card);
    grid.appendChild(btn);
  });

  // Reset reveal
  const rt = document.getElementById('revealText');
  const rs = document.getElementById('revealSub');
  rt.textContent = '';
  rt.className = 'reveal-text';
  rs.textContent = '';
  rs.className = 'reveal-sub';

  // Hint
  document.getElementById('hintPill').innerHTML = `<strong>למטפל/ת:</strong> ${card.hint}`;

  // Progress
  buildProgress();

  // Speak automatically
  setTimeout(() => speakQuestion(), 600);
}

function onChoice(btn, label, card) {
  if (answered) return;
  answered = true;

  const isCorrect = label === card.answer;
  btn.classList.add(isCorrect ? 'correct' : 'wrong');

  const rt = document.getElementById('revealText');
  const rs = document.getElementById('revealSub');

  if (isCorrect) {
    rt.textContent = `✅ ${card.answer}!`;
    rt.style.color = '#a8e063';
    speakAnswer(card.answer, true);
  } else {
    rt.textContent = `התשובה: ${card.answer} ${card.answerEmoji}`;
    rt.style.color = '#f5a623';
    speakAnswer(card.answer, false);
    // highlight correct
    document.querySelectorAll('.choice-btn').forEach(b => {
      if (b.querySelector('span:last-child').textContent === card.answer) {
        b.classList.add('correct');
      }
    });
  }
  rt.classList.add('show');
  rs.textContent = card.sub;
  rs.classList.add('show');
}

function speakQuestion() {
  const card = cards[index];
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(card.question);
  u.lang = 'he-IL';
  u.pitch = 1.4;
  u.rate = 0.8;
  speechSynthesis.speak(u);
}

function speakAnswer(answer, correct) {
  window.speechSynthesis.cancel();
  const text = correct ? `כן! ${answer}! יָפֶה מאוד!` : `התשובה היא ${answer}`;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'he-IL';
  u.pitch = correct ? 1.5 : 1.2;
  u.rate = 0.82;
  speechSynthesis.speak(u);
}

function nextCard() {
  index++;
  if (index >= cards.length) {
    showCelebrate();
    return;
  }
  renderCard();
}

function showCelebrate() {
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance('וואו! כל הכבוד לכולם! סיימתם! איזו קבוצה מדהימה!');
  u.lang = 'he-IL';
  u.pitch = 1.5;
  u.rate = 0.82;
  speechSynthesis.speak(u);
  document.getElementById('celebrate').classList.add('show');
}

function buildProgress() {
  const row = document.getElementById('progressRow');
  row.innerHTML = '';
  cards.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === index ? ' active' : i < index ? ' done' : '');
    row.appendChild(d);
  });
}

restart();
</script>
