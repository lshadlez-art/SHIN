<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #FFF6EC; font-family: 'Varela Round', sans-serif; min-height: 100vh; direction: rtl; overflow-x: hidden; }
  .bg { position: fixed; inset: 0; z-index: 0; background-image: radial-gradient(circle at 15% 20%, rgba(255,202,87,0.18) 0%, transparent 40%), radial-gradient(circle at 85% 75%, rgba(255,107,53,0.12) 0%, transparent 40%); pointer-events: none; }
  header { position: relative; z-index: 5; text-align: center; padding: 20px 16px 4px; }
  header h1 { font-family: 'Fredoka One', cursive; font-size: clamp(2rem, 7vw, 3rem); color: #FF6B35; text-shadow: 3px 3px 0 #FFE0CC; }
  header .subtitle { font-size: 0.9rem; color: #bbb; margin-top: 4px; }
  .dots-row { display: flex; justify-content: center; gap: 10px; margin: 10px 0 14px; position: relative; z-index: 5; }
  .dot { width: 20px; height: 20px; border-radius: 50%; background: #E0D4F5; transition: background 0.3s, transform 0.3s; }
  .dot.done { background: #a55eea; transform: scale(1.1); }
  .dot.active { background: #FF6B35; transform: scale(1.35); }
  .wrap { position: relative; z-index: 5; max-width: 580px; margin: 0 auto; padding: 0 12px 60px; }
  .story-card { background: white; border-radius: 28px; box-shadow: 0 10px 40px rgba(0,0,0,0.10); border: 3px solid #FFE0CC; overflow: hidden; animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes popIn { from { opacity: 0; transform: scale(0.88); } to { opacity: 1; transform: scale(1); } }
  .char-label { padding: 10px 18px; font-family: 'Fredoka One', cursive; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; border-bottom: 2px dashed #FFE0CC; }
  .story-img-wrap { width: 100%; }
  .story-img-wrap img { width: 100%; height: auto; display: block; }
  .question-wrap { background: #FFF0FF; border-top: 2px dashed #E8CCFF; padding: 14px 18px 10px; text-align: center; }
  .question-text { font-family: 'Fredoka One', cursive; font-size: 1.6rem; color: #a55eea; line-height: 1.3; }
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 14px 14px 18px; }
  .opt-btn {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; padding: 14px 10px;
    border-radius: 22px; border: 4px solid #E8DDFF;
    background: #FAFAFF; cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    text-align: center;
  }
  .opt-btn:hover:not(:disabled) { transform: scale(1.04); border-color: #a55eea; box-shadow: 0 4px 20px rgba(165,94,234,0.2); }
  .opt-emoji { font-size: 3.5rem; line-height: 1; }
  .opt-text { font-family: 'Fredoka One', cursive; font-size: 1.15rem; color: #333; line-height: 1.3; }
  .opt-text .ki { color: #FF6B35; }
  .opt-btn.correct { border-color: #26de81; background: #EDFFF6; animation: correctBounce 0.4s ease; }
  .opt-btn.correct .opt-text { color: #1a9e55; }
  .opt-btn.correct .opt-text .ki { color: #1a9e55; }
  .opt-btn.wrong { border-color: #fc5c65; background: #FFF0F0; animation: wrongWobble 0.4s ease; }
  .opt-btn.wrong .opt-text { color: #c0392b; }
  .opt-btn.wrong .opt-text .ki { color: #c0392b; }
  @keyframes correctBounce { 0%{transform:scale(1)} 40%{transform:scale(1.08)} 100%{transform:scale(1)} }
  @keyframes wrongWobble { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-10px)} 75%{transform:translateX(10px)} }
  .feedback { text-align: center; font-family: 'Fredoka One', cursive; font-size: 1.8rem; padding: 4px 16px 0; min-height: 40px; }
  .next-btn { display: none; margin: 10px 14px 20px; padding: 20px; border-radius: 24px; border: none; background: linear-gradient(135deg, #FF6B35, #ffad60); color: white; font-family: 'Fredoka One', cursive; font-size: 1.6rem; cursor: pointer; box-shadow: 0 6px 20px rgba(255,107,53,0.3); width: calc(100% - 28px); }
  .finish { display: none; text-align: center; background: white; border-radius: 28px; padding: 40px 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.10); }
  .finish.show { display: block; }
  .finish-big { font-size: 6rem; display: block; margin-bottom: 10px; }
  .finish-title { font-family: 'Fredoka One', cursive; font-size: 3rem; color: #FF6B35; margin-bottom: 8px; }
  .stars-final { font-size: 3rem; letter-spacing: 8px; margin: 16px 0 30px; }
  .restart-btn { padding: 18px 44px; border-radius: 24px; border: none; background: linear-gradient(135deg, #a55eea, #7c55d4); color: white; font-family: 'Fredoka One', cursive; font-size: 1.5rem; cursor: pointer; }
  .float-star { position: fixed; pointer-events: none; z-index: 9999; font-size: 3rem; animation: floatUp 0.9s ease-out forwards; }
  @keyframes floatUp { 0%{transform:translateY(0) scale(0.4);opacity:1} 100%{transform:translateY(-120px) scale(1.6);opacity:0} }
  .confetti-piece { position: fixed; pointer-events: none; z-index: 9999; width: 14px; height: 14px; border-radius: 3px; top: -14px; animation: confettiFall linear forwards; }
  @keyframes confettiFall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
</style>

var current = 0, score = 0, answered = false;

function buildDots() {
  var row = document.getElementById('dots-row');
  row.innerHTML = '';
  STORIES.forEach(function(_, i) {
    var d = document.createElement('div');
    d.className = 'dot' + (i < current ? ' done' : i === current ? ' active' : '');
    row.appendChild(d);
  });
}

function render() {
  if (current >= STORIES.length) { showFinish(); return; }
  answered = false;
  buildDots();
  var s = STORIES[current];
  var card = document.getElementById('story-card');
  var charEmoji = s.char.indexOf('נבי') >= 0 ? '&#x1F430;' : '&#x1F42D;';
  var html = '<div class="char-label" style="color:' + s.charColor + '">';
  html += '<span style="font-size:1.5rem">' + charEmoji + '</span>';
  html += '<span>' + s.char + '</span></div>';
  html += '<div class="story-img-wrap"><img src="' + s.img + '" alt="סיפור" /></div>';
  html += '<div class="question-wrap"><div class="question-text">&#x2753; ' + s.question + '</div></div>';
  html += '<div class="options" id="options"></div>';
  html += '<div class="feedback" id="feedback"></div>';
  var nextLabel = current < STORIES.length - 1 ? 'הבא &#x27A1;&#xFE0F;' : '&#x1F389; סיום!';
  html += '<button class="next-btn" id="next-btn" onclick="next()">' + nextLabel + '</button>';
  card.innerHTML = html;
  card.style.animation = 'none';
  void card.offsetHeight;
  card.style.animation = '';

  var opts = document.getElementById('options');
  s.options.forEach(function(opt) {
    var btn = document.createElement('button');
    btn.className = 'opt-btn';
    // highlight the word כי in orange
    var highlighted = opt.text.replace('כי', '<span class="ki">כי</span>');
    btn.innerHTML = '<div class="opt-emoji">' + opt.emoji + '</div>'
      + '<div class="opt-text">' + highlighted + '</div>';
    btn.addEventListener('click', function() { pick(btn, opt.correct); });
    opts.appendChild(btn);
  });
}

function pick(btn, correct) {
  if (answered) return;
  answered = true;
  document.querySelectorAll('.opt-btn').forEach(function(b) { b.disabled = true; });
  var fb = document.getElementById('feedback');
  var nextBtn = document.getElementById('next-btn');
  if (correct) {
    btn.classList.add('correct');
    btn.querySelector('.opt-emoji').textContent = '✅';
    fb.textContent = '🌟 יופי! נכון!';
    score++;
    spawnStars(btn);
  } else {
    btn.classList.add('wrong');
    btn.querySelector('.opt-emoji').textContent = '❌';
    fb.textContent = '💪 לא נורא!';
    document.querySelectorAll('.opt-btn').forEach(function(b) {
      if (!b.classList.contains('wrong')) {
        b.classList.add('correct');
        b.querySelector('.opt-emoji').textContent = '✅';
      }
    });
  }
  nextBtn.style.display = 'block';
}

function next() { current++; render(); }

function showFinish() {
  document.getElementById('story-card').style.display = 'none';
  var fin = document.getElementById('finish');
  fin.classList.add('show');
  var stars = '';
  for (var i = 0; i < score; i++) stars += '⭐';
  document.getElementById('stars-final').textContent = stars || '💪';
  confetti();
}

function restart() {
  current = 0; score = 0; answered = false;
  document.getElementById('story-card').style.display = '';
  document.getElementById('finish').classList.remove('show');
  render();
}

function spawnStars(el) {
  var r = el.getBoundingClientRect();
  ['⭐','✨','🌟','🎉'].forEach(function(em, i) {
    var d = document.createElement('div');
    d.className = 'float-star';
    d.textContent = em;
    d.style.left = (r.left + r.width/2 + (i-1)*30) + 'px';
    d.style.top = (r.top + 20) + 'px';
    document.body.appendChild(d);
    setTimeout(function() { d.remove(); }, 1000);
  });
}

function confetti() {
  var colors = ['#FF6B35','#FECA57','#a55eea','#45aaf2','#26de81','#fc5c65'];
  for (var i = 0; i < 80; i++) {
    (function(i) {
      setTimeout(function() {
        var el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.left = Math.random() * 100 + 'vw';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.animationDuration = (1.8 + Math.random() * 2) + 's';
        el.style.borderRadius = Math.random() > 0.5 ? '50%' : '3px';
        document.body.appendChild(el);
        setTimeout(function() { el.remove(); }, 4000);
      }, i * 25);
    })(i);
  }
}

render();
</script>

</body></html>
