<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>משחק חוף הים – שליפה לקסיקלית</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;900&display=swap');

:root {
  --sea: #0077b6;
  --sea-light: #90e0ef;
  --sea-dark: #023e8a;
  --sand: #f9dfa0;
  --sand-dark: #e6b95e;
  --sun: #ffbe0b;
  --coral: #ff6b6b;
  --green: #06d6a0;
  --white: #ffffff;
  --text: #023e8a;
  --radius: 20px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Heebo', sans-serif;
  background: linear-gradient(180deg, #caf0f8 0%, #90e0ef 40%, #f9dfa0 100%);
  min-height: 100vh;
  direction: rtl;
  overflow-x: hidden;
}

/* ── WAVES DECORATION ── */
.waves-bg {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 120px;
  background: linear-gradient(180deg, transparent, rgba(0,119,182,0.25));
  pointer-events: none;
  z-index: 0;
}

/* ── HEADER ── */
.header {
  background: linear-gradient(135deg, var(--sea-dark), var(--sea));
  color: white;
  text-align: center;
  padding: 22px 20px 18px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(2,62,138,0.3);
}
.header::before {
  content: '';
  position: absolute;
  top: -30px; left: -30px;
  width: 150px; height: 150px;
  background: rgba(255,255,255,0.06);
  border-radius: 50%;
}
.header h1 {
  font-size: 2.2rem;
  font-weight: 900;
  text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  position: relative;
  z-index: 1;
}
.header .sub {
  font-size: 0.9rem;
  opacity: 0.8;
  margin-top: 4px;
  position: relative;
  z-index: 1;
}
.score-bar {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-top: 10px;
  position: relative;
  z-index: 1;
}
.star { font-size: 1.5rem; transition: transform 0.3s; }
.star.earned { animation: pop 0.4s ease; }
@keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.5)} 100%{transform:scale(1)} }

/* ── MENU ── */
#menu {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 30px 20px;
  gap: 18px;
  position: relative;
  z-index: 1;
}
.menu-title {
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--sea-dark);
  text-align: center;
}
.mode-card {
  background: white;
  border-radius: var(--radius);
  padding: 22px 28px;
  width: 100%;
  max-width: 380px;
  cursor: pointer;
  box-shadow: 0 6px 24px rgba(2,62,138,0.12);
  border: 3px solid transparent;
  transition: all 0.25s;
  text-align: center;
}
.mode-card:hover {
  border-color: var(--sea);
  transform: translateY(-3px);
  box-shadow: 0 10px 32px rgba(2,62,138,0.2);
}
.mode-icon { font-size: 2.8rem; margin-bottom: 8px; }
.mode-title { font-size: 1.2rem; font-weight: 800; color: var(--sea-dark); }
.mode-desc { font-size: 0.88rem; color: #555; margin-top: 4px; }

/* ── GAME SCREEN ── */
.screen { display: none; position: relative; z-index: 1; }
.screen.active { display: block; }

.game-wrap {
  padding: 20px 16px;
  max-width: 480px;
  margin: 0 auto;
}

.progress-bar-wrap {
  background: rgba(255,255,255,0.5);
  border-radius: 50px;
  height: 8px;
  margin-bottom: 18px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--green), var(--sea));
  border-radius: 50px;
  transition: width 0.5s ease;
}

.q-card {
  background: white;
  border-radius: var(--radius);
  padding: 24px 22px;
  box-shadow: 0 8px 30px rgba(2,62,138,0.13);
  margin-bottom: 18px;
}
.q-num {
  font-size: 0.8rem;
  color: var(--sea);
  font-weight: 700;
  margin-bottom: 6px;
}
.q-text {
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--text);
  line-height: 1.55;
}

/* NAMING OPTIONS */
.options-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.opt-btn {
  background: white;
  border: 3px solid #e0ecf5;
  border-radius: 16px;
  padding: 14px 10px;
  cursor: pointer;
  font-family: 'Heebo', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  color: var(--text);
  text-align: center;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.opt-btn .opt-emoji { font-size: 4rem; }
.opt-btn:hover:not(:disabled) {
  border-color: var(--sea);
  background: #e8f4fd;
  transform: translateY(-2px);
}
.opt-btn.correct { border-color: var(--green); background: #e8fdf7; }
.opt-btn.wrong { border-color: var(--coral); background: #fff0f0; }
.opt-btn:disabled { cursor: default; }

/* HINT BTN */
.hint-btn {
  background: var(--sand);
  border: none;
  border-radius: 50px;
  padding: 10px 20px;
  font-family: 'Heebo', sans-serif;
  font-size: 0.95rem;
  font-weight: 700;
  color: #7a5c00;
  cursor: pointer;
  margin-top: 14px;
  transition: all 0.2s;
  display: block;
  width: 100%;
}
.hint-btn:hover { background: var(--sand-dark); }
.hint-text {
  text-align: center;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--sea-dark);
  margin-top: 10px;
  display: none;
}

/* CLUES MODE */
.clue-item {
  background: white;
  border-radius: var(--radius);
  padding: 16px 20px;
  box-shadow: 0 4px 16px rgba(2,62,138,0.1);
  margin-bottom: 12px;
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 10px;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.4s ease;
}
.clue-item.visible { opacity: 1; transform: translateY(0); }
.clue-num {
  background: var(--sea);
  color: white;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  font-weight: 900;
  flex-shrink: 0;
}

.reveal-btn {
  background: linear-gradient(135deg, var(--sea), var(--sea-dark));
  color: white;
  border: none;
  border-radius: 50px;
  padding: 14px 30px;
  font-family: 'Heebo', sans-serif;
  font-size: 1.1rem;
  font-weight: 800;
  cursor: pointer;
  display: block;
  width: 100%;
  margin-top: 16px;
  transition: all 0.2s;
  box-shadow: 0 4px 16px rgba(2,62,138,0.3);
}
.reveal-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(2,62,138,0.4); }

.answer-reveal {
  background: linear-gradient(135deg, #e8fdf7, #d0f7ee);
  border: 3px solid var(--green);
  border-radius: var(--radius);
  padding: 20px;
  text-align: center;
  margin-top: 16px;
  display: none;
}
.answer-reveal .a-emoji { font-size: 3rem; }
.answer-reveal .a-word { font-size: 1.6rem; font-weight: 900; color: var(--sea-dark); margin-top: 6px; }
.answer-reveal .a-exp { font-size: 0.9rem; color: #555; margin-top: 4px; }

/* SORT MODE */
#sort-items-list {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
}
.sort-item {
  background: white;
  border: 3px solid #d0e8f5;
  border-radius: 16px;
  padding: 12px 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.sort-item:hover { border-color: var(--sea); transform: translateY(-3px); }
.sort-item .s-emoji { font-size: 2.8rem; }
.sort-item .s-word { font-size: 0.88rem; font-weight: 700; color: var(--text); }
.sort-item .s-check { font-size: 1.2rem; visibility: hidden; }
.sort-item.placed .s-check { visibility: visible; }

.categories {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 16px;
}
.cat-zone {
  background: white;
  border: 3px dashed #aad4f0;
  border-radius: var(--radius);
  padding: 14px 10px;
  min-height: 100px;
  text-align: center;
  transition: all 0.2s;
}
.cat-zone.highlight { border-color: var(--sea); background: #e8f4fd; }
.cat-zone.correct { border-color: var(--green); background: #e8fdf7; border-style: solid; }
.cat-zone.wrong { border-color: var(--coral); background: #fff0f0; border-style: solid; }
.cat-title {
  font-size: 0.88rem;
  font-weight: 800;
  color: var(--sea-dark);
  margin-bottom: 8px;
}
.cat-items { font-size: 0.85rem; color: #666; min-height: 30px; }

/* NAV BTN */
.next-btn {
  background: linear-gradient(135deg, var(--sea-dark), var(--sea));
  color: white;
  border: none;
  border-radius: 50px;
  padding: 14px 30px;
  font-family: 'Heebo', sans-serif;
  font-size: 1.1rem;
  font-weight: 800;
  cursor: pointer;
  display: none;
  width: 100%;
  margin-top: 16px;
  box-shadow: 0 4px 16px rgba(2,62,138,0.3);
  transition: all 0.2s;
}
.next-btn:hover { transform: translateY(-2px); }
.next-btn.show { display: block; }

.back-btn {
  background: rgba(255,255,255,0.7);
  border: 2px solid rgba(2,62,138,0.2);
  border-radius: 50px;
  padding: 8px 20px;
  font-family: 'Heebo', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--sea-dark);
  cursor: pointer;
  margin: 0 auto 16px;
  display: block;
  transition: all 0.2s;
}
.back-btn:hover { background: white; }

/* END SCREEN */
#end {
  text-align: center;
  padding: 40px 20px;
  position: relative;
  z-index: 1;
}
.trophy { font-size: 5rem; margin-bottom: 16px; animation: bounce 0.8s ease infinite alternate; }
@keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-12px)} }
.end-title { font-size: 2rem; font-weight: 900; color: var(--sea-dark); margin-bottom: 8px; }
.end-score { font-size: 1.2rem; color: #555; margin-bottom: 28px; }
.play-again-btn {
  background: linear-gradient(135deg, var(--sun), #ffc300);
  color: #7a5c00;
  border: none;
  border-radius: 50px;
  padding: 16px 40px;
  font-family: 'Heebo', sans-serif;
  font-size: 1.2rem;
  font-weight: 900;
  cursor: pointer;
  box-shadow: 0 6px 20px rgba(255,190,11,0.4);
  transition: all 0.2s;
}
.play-again-btn:hover { transform: translateY(-3px); }

/* FEEDBACK TOAST */
.toast {
  position: fixed;
  top: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: var(--green);
  color: white;
  font-family: 'Heebo', sans-serif;
  font-size: 1.2rem;
  font-weight: 800;
  padding: 12px 28px;
  border-radius: 50px;
  box-shadow: 0 6px 20px rgba(6,214,160,0.4);
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  z-index: 100;
  white-space: nowrap;
}
.toast.wrong-toast { background: var(--coral); box-shadow: 0 6px 20px rgba(255,107,107,0.4); }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="waves-bg"></div>
<div class="toast" id="toast"></div>

<!-- HEADER -->
<div class="header">
  <h1>🌊 משחק חוף הים</h1>
  <div class="sub">תרגול שליפה לקסיקלית</div>
  <div style="font-size:0.78rem;opacity:0.65;margin-top:4px;position:relative;z-index:1;">✏️ לילך כספרי – קלינאית תקשורת</div>
  <div class="score-bar" id="stars"></div>
</div>

<!-- MENU -->
<div id="menu">
  <div class="menu-title">בחרי מצב משחק 🏖️</div>

  <div class="mode-card" onclick="startMode('naming')">
    <div class="mode-icon">🔍</div>
    <div class="mode-title">שיום</div>
    <div class="mode-desc">קראי את התיאור, מצאי את המילה הנכונה</div>
  </div>

  <div class="mode-card" onclick="startMode('clues')">
    <div class="mode-icon">💡</div>
    <div class="mode-title">רמזים</div>
    <div class="mode-desc">שלושה רמזים — מנחשים את המילה</div>
  </div>

  <div class="mode-card" onclick="startMode('sort')">
    <div class="mode-icon">🧺</div>
    <div class="mode-title">מיון</div>
    <div class="mode-desc">מחלקים פריטי חוף לקטגוריות</div>
  </div>
</div>

<!-- NAMING SCREEN -->
<div id="screen-naming" class="screen">
  <div class="game-wrap">
    <button class="back-btn" onclick="backToMenu()">← תפריט</button>
    <div class="progress-bar-wrap">
      <div class="progress-fill" id="naming-progress"></div>
    </div>
    <div class="q-card">
      <div class="q-num" id="naming-qnum"></div>
      <div class="q-text" id="naming-clue"></div>
    </div>
    <div class="options-grid" id="naming-options"></div>
    <button class="hint-btn" id="naming-hint-btn" onclick="showHint()">💡 רמז ראשוני</button>
    <div class="hint-text" id="naming-hint"></div>
    <button class="next-btn" id="naming-next" onclick="nextNaming()">הבא ←</button>
  </div>
</div>

<!-- CLUES SCREEN -->
<div id="screen-clues" class="screen">
  <div class="game-wrap">
    <button class="back-btn" onclick="backToMenu()">← תפריט</button>
    <div class="progress-bar-wrap">
      <div class="progress-fill" id="clues-progress"></div>
    </div>
    <div id="clues-list"></div>
    <button class="reveal-btn" id="clues-reveal-btn" onclick="revealAnswer()">גלה את התשובה 🌟</button>
    <div class="answer-reveal" id="clues-answer"></div>
    <button class="next-btn" id="clues-next" onclick="nextClues()">הבא ←</button>
  </div>
</div>

<!-- SORT SCREEN -->
<div id="screen-sort" class="screen">
  <div class="game-wrap">
    <button class="back-btn" onclick="backToMenu()">← תפריט</button>
    <div class="progress-bar-wrap">
      <div class="progress-fill" id="sort-progress"></div>
    </div>
    <div class="categories" id="sort-cats"></div>
    <div id="sort-items-list"></div>
    <button class="next-btn" id="sort-next" onclick="nextSort()">הבא ←</button>
  </div>
</div>

<!-- END -->
<div id="end" class="screen">
  <div class="trophy" id="end-trophy">🏆</div>
  <div class="end-title" id="end-title">כל הכבוד!</div>
  <div class="end-score" id="end-score"></div>
  <button class="play-again-btn" onclick="backToMenu()">🌊 שחקי שוב</button>
</div>

function updateStars() {

  s.innerHTML = '';
  for (var i = 0; i < maxScore; i++) {
    var sp = document.createElement('span');
    sp.className = 'star' + (i < score ? ' earned' : '');

  }
}

function addStar() {

}

  setTimeout(function() { t.className = 'toast' + (isWrong ? ' wrong-toast' : ''); }, 1800);
}

// ═══════════════════ MENU ═══════════════════

function backToMenu() {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById('menu').style.display = 'flex';
}

function startMode(mode) {
  currentMode = mode;
  score = 0;
  document.getElementById('menu').style.display = 'none';
  if (mode === 'naming') {
    nIdx = 0; maxScore = namingItems.length;
    updateStars();
    showNaming();
    document.getElementById('screen-naming').classList.add('active');
  } else if (mode === 'clues') {
    cIdx = 0; maxScore = cluesItems.length;
    updateStars();
    showClues();
    document.getElementById('screen-clues').classList.add('active');
  } else if (mode === 'sort') {
    sIdx = 0; maxScore = sortSets.length;
    updateStars();
    showSort();
    document.getElementById('screen-sort').classList.add('active');
  }
}

// ═══════════════════ NAMING ═══════════════════

function showNaming() {
  hintUsed = false;
  var it = namingItems[nIdx];
  document.getElementById('naming-qnum').textContent = 'שאלה ' + (nIdx+1) + ' מתוך ' + namingItems.length;
  document.getElementById('naming-clue').textContent = it.clue;
  document.getElementById('naming-hint').style.display = 'none';
  document.getElementById('naming-hint-btn').style.display = 'block';
  document.getElementById('naming-next').className = 'next-btn';

  var pct = (nIdx / namingItems.length * 100) + '%';
  document.getElementById('naming-progress').style.width = pct;

  var grid = document.getElementById('naming-options');
  grid.innerHTML = '';
  it.options.forEach(function(opt) {
    var btn = document.createElement('button');
    btn.className = 'opt-btn';
    var emojiHtml = opt.e === '__SC__' ? '<img src="'+SUNSCREEN_IMG+'" style="width:5rem;height:5rem;object-fit:contain;">' : opt.e === '__SHELL__' ? '<img src="'+SHELL_IMG+'" style="width:5rem;height:5rem;object-fit:contain;">' : opt.e === '__RIVER__' ? '<img src="'+RIVER_IMG+'" style="width:5rem;height:5rem;object-fit:cover;border-radius:8px;">' : opt.e === '__TOWEL2__' ? '<img src="'+TOWEL2_IMG+'" style="width:5rem;height:5rem;object-fit:cover;border-radius:8px;">' : opt.e === '__PUDDLE__' ? '<img src="'+PUDDLE_IMG+'" style="width:5rem;height:5rem;object-fit:cover;border-radius:8px;">' : opt.e === '__MAP__' ? '<img src="'+MAP_IMG+'" style="width:5rem;height:5rem;object-fit:cover;border-radius:8px;">' : opt.e;
    btn.innerHTML = '<span class="opt-emoji">' + emojiHtml + '</span><span>' + opt.w + '</span>';
    btn.onclick = function() { checkNaming(opt.w, btn, it.answer); };
    grid.appendChild(btn);
  });
}

function checkNaming(chosen, btn, correct) {
  document.querySelectorAll('.opt-btn').forEach(function(b){ b.disabled = true; });
  if (chosen === correct) {
    btn.classList.add('correct');
    showToast('כל הכבוד! 🌟');
    if (!hintUsed) addStar();
  } else {
    btn.classList.add('wrong');
    showToast('לא נכון… נסי שוב', true);
    // find correct and highlight
    document.querySelectorAll('.opt-btn').forEach(function(b){
      if (b.querySelector('span:last-child').textContent === correct) b.classList.add('correct');
    });
  }
  document.getElementById('naming-next').className = 'next-btn show';
}

function showHint() {
  hintUsed = true;
  var it = namingItems[nIdx];
  var h = document.getElementById('naming-hint');
  h.textContent = '💡 רמז: ' + it.hint;
  h.style.display = 'block';
  document.getElementById('naming-hint-btn').style.display = 'none';
}

function nextNaming() {
  nIdx++;
  if (nIdx >= namingItems.length) {
    endGame('naming');
  } else {
    showNaming();
  }
}

// ═══════════════════ CLUES ═══════════════════

function showClues() {
  var it = cluesItems[cIdx];
  var pct = (cIdx / cluesItems.length * 100) + '%';
  document.getElementById('clues-progress').style.width = pct;

  var list = document.getElementById('clues-list');
  list.innerHTML = '';
  it.clues.forEach(function(clue, i) {
    var div = document.createElement('div');
    div.className = 'clue-item';
    div.innerHTML = '<span class="clue-num">' + (i+1) + '</span>' + clue;
    list.appendChild(div);
    setTimeout(function() { div.classList.add('visible'); }, i * 400);
  });

  var ans = document.getElementById('clues-answer');
  ans.style.display = 'none';
  document.getElementById('clues-reveal-btn').style.display = 'block';
  document.getElementById('clues-next').className = 'next-btn';
}

function revealAnswer() {
  var it = cluesItems[cIdx];
  var ans = document.getElementById('clues-answer');
  var emojiHtmlA = it.emoji === '__SC__' ? '<img src="'+SUNSCREEN_IMG+'" style="width:7rem;height:7rem;object-fit:contain;">' : it.emoji === '__SHOVEL__' ? '<img src="'+SHOVEL_IMG+'" style="width:7rem;height:7rem;object-fit:contain;">' : it.emoji === '__TOWEL__' ? '<img src="'+TOWEL_IMG+'" style="width:7rem;height:7rem;object-fit:cover;border-radius:10px;">' : it.emoji === '__SHELL__' ? '<img src="'+SHELL_IMG+'" style="width:7rem;height:7rem;object-fit:contain;">' : it.emoji;
  ans.innerHTML = '<div class="a-emoji">' + emojiHtmlA + '</div><div class="a-word">' + it.answer + '</div><div class="a-exp">' + it.exp + '</div>';
  ans.style.display = 'block';
  document.getElementById('clues-reveal-btn').style.display = 'none';
  addStar();
  document.getElementById('clues-next').className = 'next-btn show';
}

function nextClues() {
  cIdx++;
  if (cIdx >= cluesItems.length) {
    endGame('clues');
  } else {
    showClues();
  }
}

// ═══════════════════ SORT ═══════════════════

function showSort() {
  sortSelected = null;
  sortPlaced = {};
  sortDone = false;
  var set = sortSets[sIdx];
  var pct = (sIdx / sortSets.length * 100) + '%';
  document.getElementById('sort-progress').style.width = pct;

  // categories
  var catsDiv = document.getElementById('sort-cats');
  catsDiv.innerHTML = '';
  set.cats.forEach(function(cat) {
    var z = document.createElement('div');
    z.className = 'cat-zone';
    z.id = 'cat-' + cat;
    z.innerHTML = '<div class="cat-title">📂 ' + cat + '</div><div class="cat-items" id="ci-' + cat + '"></div>';
    z.onclick = function() { placeToCat(cat); };
    catsDiv.appendChild(z);
  });

  // items
  var list = document.getElementById('sort-items-list');
  list.innerHTML = '';
  shuffle(set.items).forEach(function(item, i) {
    var div = document.createElement('div');
    div.className = 'sort-item';
    div.id = 'si-' + i;
    div.dataset.idx = i;
    div.dataset.word = item.w;
    div.dataset.cat = item.cat;
    var seHtml = item.e === '__SC__' ? '<img src="'+SUNSCREEN_IMG+'" style="width:3.5rem;height:3.5rem;object-fit:contain;">' : item.e === '__SHOVEL__' ? '<img src="'+SHOVEL_IMG+'" style="width:3.5rem;height:3.5rem;object-fit:contain;">' : item.e === '__TOWEL__' ? '<img src="'+TOWEL_IMG+'" style="width:3.5rem;height:3.5rem;object-fit:cover;border-radius:8px;">' : item.e === '__SHELL__' ? '<img src="'+SHELL_IMG+'" style="width:3.5rem;height:3.5rem;object-fit:contain;">' : item.e;
    div.innerHTML = '<span class="s-emoji">' + seHtml + '</span><span class="s-word">' + item.w + '</span><span class="s-check">✓</span>';
    div.onclick = function() { selectItem(div); };
    list.appendChild(div);
  });

  document.getElementById('sort-next').className = 'next-btn';
}

function selectItem(div) {
  if (div.classList.contains('placed')) return;
  document.querySelectorAll('.sort-item').forEach(function(d){ d.style.background = ''; d.style.borderColor = ''; });
  if (sortSelected === div) {
    sortSelected = null;
    return;
  }
  sortSelected = div;
  div.style.background = '#e8f4fd';
  div.style.borderColor = 'var(--sea)';
}

function placeToCat(cat) {
  if (!sortSelected) return;
  var word = sortSelected.dataset.word;
  var correct = sortSelected.dataset.cat;
  var zone = document.getElementById('cat-' + cat);

  if (cat === correct) {
    sortSelected.classList.add('placed');
    sortSelected.style.background = '';
    sortSelected.style.borderColor = '';
    var ci = document.getElementById('ci-' + cat);
    ci.textContent += (ci.textContent ? ', ' : '') + word;
    zone.className = 'cat-zone correct';
    showToast('כל הכבוד! ✅');
    sortPlaced[word] = true;

    var total = sortSets[sIdx].items.length;
    if (Object.keys(sortPlaced).length === total) {
      addStar();
      document.getElementById('sort-next').className = 'next-btn show';
    }
  } else {
    zone.className = 'cat-zone wrong';
    showToast('לא שם... נסי שוב', true);
    setTimeout(function() { zone.className = 'cat-zone'; }, 800);
  }
  sortSelected.style.background = '';
  sortSelected.style.borderColor = '';
  sortSelected = null;
}

function nextSort() {
  sIdx++;
  if (sIdx >= sortSets.length) {
    endGame('sort');
  } else {
    showSort();
  }
}

// ═══════════════════ END ═══════════════════

function endGame(mode) {
  document.getElementById('screen-' + mode).classList.remove('active');
  document.getElementById('end').classList.add('active');
  document.getElementById('end-title').textContent = score >= maxScore ? '🏆 כל הכבוד!' : '🌟 יופי!';
  document.getElementById('end-score').textContent = 'צברת ' + score + ' מתוך ' + maxScore + ' כוכבים';
  document.getElementById('end-progress-fill') && (document.getElementById('end-progress-fill').style.width = '100%');
}

// ═══════════════════ UTILS ═══════════════════

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

updateStars();
</script>
</body>
